version: '3.8'

services:
  neo4j:
    image: neo4j:5.15
    container_name: cinegraph-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/cinegraph123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/7687'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
    networks:
      - cinegraph-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinegraph-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=cinegraph123
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - BACKEND_PORT=8000
    volumes:
      - ./backend/movies.csv:/app/movies.csv:ro
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cinegraph-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cinegraph-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cinegraph-network

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  cinegraph-network:
    driver: bridge

